name: CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   lint-and-format:
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v3

         - name: Set up Node.js
           uses: actions/setup-node@v3
           with:
              node-version: 18

         - name: Install dependencies
           run: npm install

         - name: Lint
           run: npm run lint

         - name: Format check
           run: npm run format:check
